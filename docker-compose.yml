services:
  postgres:
    image: postgres:16
    container_name: smartline_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartline
      POSTGRES_USER: smartline
      POSTGRES_PASSWORD: smartline123
    ports:
      - "5432:5432"
    volumes:
      - smartline_pgdata:/var/lib/postgresql/data

volumes:
  smartline_pgdata:
